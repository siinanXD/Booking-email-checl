# CI-Backstop: dieselben Checks wie lokal (pre-commit), nur serverseitig und
# unumgehbar. Merge nach 'main' wird ueber Branch-Protection an diesen Workflow
# gebunden – so kann '--no-verify' lokal nichts durchschmuggeln.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (Lint)
        run: ruff check .

      - name: Black (Format-Check)
        run: black --check .

      - name: MyPy (Typen)
        run: mypy .

      - name: PyTest
        run: pytest -q
